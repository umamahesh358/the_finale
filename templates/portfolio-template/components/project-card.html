<!-- ============================================
     project-card.html — Project Card Template Reference
     (Actual rendering happens via projects.js)
     This file documents the card HTML structure.
     ============================================ -->

<!--
  USAGE:
  This template shows the canonical structure of a project card.
  Cards are dynamically created by createProjectCard() in projects.js.
  Include this file as reference for styling adjustments.

  Structure:
  .card.project-card
    ├── .project-card-image        ← Gradient emoji banner
    ├── span.category              ← Category label
    ├── h3.project-card-title      ← Project name
    ├── p.project-card-desc        ← Description
    ├── .tech-stack                ← Tech badge pills
    └── .project-links             ← Live demo + GitHub buttons
-->

<div class="card project-card" aria-label="Project card template">
  <!-- Visual Banner -->
  <div class="project-card-image" style="background: linear-gradient(135deg, #667eea, #764ba2);">
    <span style="color: white; font-size: 3rem;">🤖</span>
    <!-- Optional: Featured badge -->
    <span style="position:absolute; top: 0.75rem; right: 0.75rem; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.65rem; font-weight: 700; color: white; letter-spacing: 0.08em;">
      ★ FEATURED
    </span>
  </div>

  <!-- Category -->
  <span style="font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;">
    AI/ML
  </span>

  <!-- Title -->
  <h3 class="project-card-title">Project Name</h3>

  <!-- Description -->
  <p class="project-card-desc">
    A brief description of what the project does and the problem it solves,
    written clearly for a technical audience.
  </p>

  <!-- Tech Stack -->
  <div class="tech-stack">
    <span class="tech-badge">React</span>
    <span class="tech-badge">Node.js</span>
    <span class="tech-badge">MongoDB</span>
  </div>

  <!-- Links -->
  <div class="project-links">
    <a href="#" class="btn btn-primary btn-sm">🚀 Live Demo</a>
    <a href="#" class="btn btn-ghost btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>

      GitHub
    </a>
  </div>
</div>
